version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: koptumbuh-db
    environment:
      POSTGRES_DB: koptumbuh_dev
      POSTGRES_USER: dev_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/koptumbuh_updated_minimal_data_model.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed_demo.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_admin -d koptumbuh_dev"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koptumbuh-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: koptumbuh-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  evolution:
    image: atendai/evolution-api:latest
    container_name: koptumbuh-evolution
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-koptumbuh-evolution-key}
      LANGUAGE: en
    volumes:
      - evolution_data:/evolution/instances
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: koptumbuh-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dev_admin:${DB_PASSWORD:-devpassword}@postgres:5432/koptumbuh_dev
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_password}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-koptumbuh-evolution-key}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-hackathon-jasaai-2026}
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: koptumbuh-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://dev_admin:${DB_PASSWORD:-devpassword}@postgres:5432/koptumbuh_dev
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_password}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-koptumbuh-evolution-key}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-hackathon-jasaai-2026}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: koptumbuh-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://dev_admin:${DB_PASSWORD:-devpassword}@postgres:5432/koptumbuh_dev
      REDIS_URL: redis://redis:6379/0
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-koptumbuh-evolution-key}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-hackathon-jasaai-2026}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: koptumbuh-web
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  minio_data:
  evolution_data:
